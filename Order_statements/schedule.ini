; =============================================================================
; Автозапуск Order_statements по расписанию (Windows Планировщик заданий)
; =============================================================================
; После изменения этого файла запустите setup_schedule.bat от имени администратора
; (нужно для пробуждения ПК из сна).
;
; enabled — true = расписание включено, false = выключено (задание удаляется)
; time    — время запуска в формате ЧЧ:ММ (24 часа), например 08:30
; days    — daily       — каждый день
;           weekdays    — пн–пт
;           пн,ср,пт    — конкретные дни (пн вт ср чт пт сб вс)
;
; files_per_run — сколько CSV копировать из future_uploads за запуск (0 = без лимита)
; daily_limit   — максимум успешных отправок в день (0 = без лимита)
; =============================================================================

enabled=true
time=09:00
days=daily
files_per_run=30
daily_limit=30
